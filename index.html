      // No background card — clean document layout
      const FS_LABEL=7.5,FS_HEADING=16,FS_VALUE=9.5;
      const LINE_H=12.5; // value line height (~9.5pt font at 1.3x)
      const GAP_AFTER=7;  // gap after each field value block
      const C_LABEL=[204,51,0],C_HEADING=[26,26,26],C_VALUE=[50,48,46];

      // Dry-run to measure total height
      doc.setFontSize(FS_VALUE);
      let dryH=14+18; // top margin + "MEMORABLE MOMENT" label + gap
      if(mo.heading&&mo.heading.trim()){
        doc.setFontSize(FS_HEADING);
        dryH+=doc.splitTextToSize(mo.heading.trim(),moW).length*20+10;
      }
      doc.setFontSize(FS_VALUE);
      const fields=[mo.what,mo.event,mo.at,mo.when,mo.who];
      fields.forEach(v=>{
        if(v&&v.trim()){
          dryH+=FS_LABEL+2; // label line
          dryH+=doc.splitTextToSize(v.trim(),moW).length*LINE_H;
          dryH+=GAP_AFTER;
        }
      });
      dryH+=6; // bottom margin

      // Coral left border accent — single vertical line
      doc.setDrawColor(204,51,0);doc.setLineWidth(3);
      doc.line(MX,y,MX,y+dryH);
      doc.setLineWidth(0.5);

      const tx=MX+8; // text indent from border
      y+=14;

      // "MEMORABLE MOMENT" section label
      doc.setFont('helvetica','bold');doc.setFontSize(FS_LABEL);
      doc.setTextColor(...C_LABEL);
      doc.text('MEMORABLE MOMENT',tx,y);y+=18;

      // Heading
      if(mo.heading&&mo.heading.trim()){
        doc.setFont('helvetica','bold');doc.setFontSize(FS_HEADING);
        doc.setTextColor(...C_HEADING);
        doc.splitTextToSize(mo.heading.trim(),moW-8).forEach(l=>{doc.text(l,tx,y);y+=20;});
        y+=8;
      }

      // Field renderer: label on own line, value on next line(s)
      function moField(label,value,fullWidth){
        if(!value||!value.trim())return;
        doc.setFont('helvetica','bold');doc.setFontSize(FS_LABEL);
        doc.setTextColor(...C_LABEL);
        doc.text(label,tx,y);
        y+=FS_LABEL+2;
        doc.setFont('helvetica','normal');doc.setFontSize(FS_VALUE);
        doc.setTextColor(...C_VALUE);
        const maxW=fullWidth?moW-8:moW-8;
        doc.splitTextToSize(value.trim(),maxW).forEach(l=>{doc.text(l,tx,y);y+=LINE_H;});
        y+=GAP_AFTER;
      }

      // Render each field in order matching reference document
      moField('WHAT',mo.what,true);
      moField('EVENT',mo.event,true);
      moField('AT',mo.at,true);
      moField('WHEN',mo.when,true);
      moField('WHO',mo.who,true);

      y+=4; // bottom margin
    }
    const maxPitchH=PH-MY-46-12-8-18-120; // page minus header,divider,col headers,min col space
    const naturalH=Math.round(usableW*bh/bw);
    const pitchH=Math.min(naturalH,maxPitchH);
    const pitchW=pitchH===naturalH?usableW:Math.round(pitchH*bw/bh);
    const pitchX=MX+Math.round((usableW-pitchW)/2);
    doc.addImage(pitchImg,'PNG',pitchX,y,pitchW,pitchH,undefined,'FAST');
    y+=pitchH+12;

    // ── Thread colours — full width ──

    // Section header — linen background, brand typography
    const{r:chR,g:chG,b:chB}=hexToRgb('#F0E6D3');
    doc.setFillColor(chR,chG,chB);doc.rect(MX,y,usableW,15,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(204,51,0);
    doc.text('THREAD COLOURS',MX+4,y+10);
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(102,102,102);
    doc.text('Brand name  \u00B7  DMC code',PW-MX-4,y+10,{align:'right'});
    y+=19;

    // Two-column grid for colour swatches
    const swatchColW=(usableW-10)/2,swatchCol2=MX+swatchColW+10;
    let swatchY1=y,swatchY2=y,swatchIdx=0;
    const seen=new Set();
    function addColour(hex,label){
      if(seen.has(hex))return;seen.add(hex);
      const swatchX=swatchIdx%2===0?MX:swatchCol2;
      const rowY=swatchIdx%2===0?swatchY1:swatchY2;
      if(rowY>PH-50){doc.addPage();swatchY1=MY;swatchY2=MY;}
      const{r:rr,g:gg,b:bb}=hexToRgb(hex);
      const dmc=nearestDMC(hex);
      doc.setFillColor(rr,gg,bb);doc.rect(swatchX,rowY,12,9,'F');
      doc.setDrawColor(150,150,150);doc.setLineWidth(0.3);doc.rect(swatchX,rowY,12,9,'S');
      doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(40,40,40);
      doc.text(label,swatchX+15,rowY+5.5);
      doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(100,100,100);
      doc.text(nnThreadLabel(hex),swatchX+15,rowY+12);
      if(swatchIdx%2===0){swatchY1+=18;}else{swatchY2+=18;}
      swatchIdx++;
    }
    addColour(cA,tnA);
    addColour(cB,tnB);
    addColour(phaseColor,'Step markers');
    if(st.edgeColorA&&st.edgeColorA!=='#ffffff')addColour(st.edgeColorA,tnA+' ring');
    if(st.edgeColorB&&st.edgeColorB!=='#ffffff')addColour(st.edgeColorB,tnB+' ring');
    balls.forEach((bl,bi)=>{if(!bl.ghost)addColour('#FFFFFF','Ball'+(balls.length>1?' '+(bi+1):''));});
    arr.forEach(a=>{if(a.color)addColour(a.color,'Arrow');});
    (st.symbols||[]).forEach(function(sym,si){if(sym.color)addColour(sym.color,'Symbol '+(si+1));});
    y=Math.max(swatchY1,swatchY2)+6;

    // ── Footer strip ── real logo (NN_Logo_WithTagline_Linen_4x.png)
    const FTR_H=20;
    doc.setFillColor(240,230,211);
    doc.rect(0,PH-FTR_H,PW,FTR_H,'F');
    // Logo image: 2580x780px source, rendered at 46x14pt, vertically centred in strip
    // NN_LOGO_LINEN defined in app-logos.js
    doc.addImage(NN_LOGO_LINEN,'PNG',MX,PH-FTR_H+3,46,14,undefined,'FAST');
    // Date centred, domain right
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(102,102,102);
    doc.text(new Date().toISOString().slice(0,10),PW/2,PH-6,{align:'center'});
    doc.text('nutmegneedle.com',PW-MX,PH-6,{align:'right'});
    doc.save('tactics-board-'+new Date().toISOString().slice(0,10)+'.pdf');
  }

  // ─── EXPORT PATTERN PDF ───────────────────────────────────────────────────────
  // Aida-ready print PDF with physically locked dimensions.
  // Builds SVG from existing helpers, renders to offscreen canvas, embeds in jsPDF at exact pt size.
  function exportPatternPDF(){
    var jsPDF_=window.jspdf&&window.jspdf.jsPDF;
    if(!jsPDF_){alert('PDF library not loaded.');return;}
    var st=S.current;
    var pl=st.players,arr=st.arrows,ph=st.phases,phaseColor=st.phaseColor,
        balls=st.balls,cA=st.colorA,cB=st.colorB,v=st.view,r=st.pR,
        cr=st.cropRegion,fmt=st.exportFormat;
    var hs=AHEAD[st.arrowHeadSize]!==undefined?AHEAD[st.arrowHeadSize]:7;

    var b=cr?{x:cr.x,y:cr.y,w:cr.w,h:cr.h}:
           v==='left'?{x:0,y:0,w:W/2,h:H}:
           v==='right'?{x:W/2,y:0,w:W/2,h:H}:
           {x:0,y:0,w:W,h:H};

    var MM=2.8346;
    var TOP_MM=10,BOT_MM=20,SIDE_MM=10;
    var HOOP_ASPECT=260/225;
    var PAGE_SIZES={a4:{w:297,h:210},letter:{w:279.4,h:215.9},hoop:{w:297,h:210}};
    var ps=PAGE_SIZES[fmt]||PAGE_SIZES['a4'];
    var PW_PT=ps.w*MM;

    var maxW=ps.w-2*SIDE_MM;
    var maxH=ps.h-TOP_MM-BOT_MM;

    var dW,dH;
    if(fmt==='hoop'){
      dH=maxH;dW=dH*HOOP_ASPECT;
      if(dW>maxW){dW=maxW;dH=dW/HOOP_ASPECT;}
    }else{
      dW=maxW;dH=maxH;
    }

    var dW_PT=Math.round(dW*MM);
    var dH_PT=Math.round(dH*MM);
    var OX=Math.round((PW_PT-dW_PT)/2);
    var OY=Math.round(TOP_MM*MM);

    // Moment data for watermark
    var mo=st.moment||{};
    var wmHeading=(mo.heading&&mo.heading.trim())||'';
    var wmEvent=(mo.event&&mo.event.trim())||'';
    var wmText=wmHeading&&wmEvent?wmHeading+' \u2014 '+wmEvent:(wmHeading||wmEvent);

    // PDF footer strip height (pts) — drawn via jsPDF, not SVG, so it is always reliable
    var FOOTER_PT=20;

    // Pitch-only SVG — no footer strip inside SVG, preserves true aspect ratio so circles stay circular
    var svgPitchW=b.w;
    var svgPitchH=b.h;

    // Fit pitch to page preserving aspect ratio (footer does not affect sizing)
    var pitchAspect=svgPitchW/svgPitchH;
    var fitDW=maxW;
    var fitDH=fitDW/pitchAspect;
    if(fitDH>maxH){fitDH=maxH;fitDW=fitDH*pitchAspect;}
    var pitchDW_PT=Math.round(fitDW*MM);
    var pitchDH_PT=Math.round(fitDH*MM);
    var PH_PT=Math.round(ps.h*MM);
    var OX2=Math.round((PW_PT-pitchDW_PT)/2);
    // Pitch centred on full page — footer placed after, does not affect pitch position.
    var OY2=Math.round((PH_PT-pitchDH_PT)/2);

    // Build pitch-only SVG
    var svgLines=[];
    svgLines.push('<svg xmlns="http://www.w3.org/2000/svg" width="'+svgPitchW+'" height="'+svgPitchH+'" viewBox="'+b.x+' '+b.y+' '+svgPitchW+' '+svgPitchH+'">');
    svgLines.push('<rect x="'+b.x+'" y="'+b.y+'" width="'+svgPitchW+'" height="'+svgPitchH+'" fill="#ffffff"/>');
    // Faint pitch stripes + Pitch Green (#4A6741) pitch lines
    pitchSVGLines(false).forEach(function(l){
      svgLines.push(
        l.replace(/fill="#3a7d44"/g,'fill="#e8f0e8"')
         .replace(/fill="#2f6b38"/g,'fill="#dceadc"')
         .replace(/stroke="rgba\(255,255,255,0\.88\)"/g,'stroke="#4A6741"')
         .replace(/stroke="#ffffff"/g,'stroke="#4A6741"')
      );
    });
    arrowSVGLines(arr,hs,false).forEach(function(l){svgLines.push(l);});
    symbolSVGLines(st.symbols).forEach(function(l){svgLines.push(l);});
    markerSVGLines(ph,phaseColor,st.markerSize,r).forEach(function(l){svgLines.push(l);});
    // Ghost players first — print-safe: transparent fill, solid dashed stroke in team colour
    // Must render BEFORE playerSVGLines so solid players draw on top
    pl.filter(function(p){return !p.hidden&&p.ghost;}).forEach(function(p){
      var col=p.team==='A'?cA:cB;
      svgLines.push('<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-dasharray="4 3"/>');
      svgLines.push('<text x="'+p.x.toFixed(1)+'" y="'+p.y.toFixed(1)+'" dy="0.36em" text-anchor="middle" font-family="Inter,sans-serif" fill="'+col+'" font-size="'+Math.max(9,Math.round(r*1.1))+'" font-weight="bold">'+p.num+'</text>');
    });
    // Solid players only (no ghosts — they were already rendered above)
    playerSVGLines(pl.filter(function(p){return !p.ghost;}),cA,cB,st,false,false).forEach(function(l){svgLines.push(l);});
    // Ghost balls first — print-safe: transparent fill, dark dashed stroke
    balls.filter(function(bl){return bl.ghost;}).forEach(function(bl){
      var br2=Math.max(6,Math.round(r*0.65));
      svgLines.push('<circle cx="'+bl.x.toFixed(1)+'" cy="'+bl.y.toFixed(1)+'" r="'+br2+'" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="4 3"/>');
    });
    // Solid balls only
    ballSVGLines(balls.filter(function(bl){return !bl.ghost;}),r,false).forEach(function(l){svgLines.push(l);});
    legendSVGLines(st,cA,cB,ph,phaseColor).forEach(function(l){svgLines.push(l);});
    // Watermark: bottom-right inside pitch area
    if(wmText){
      svgLines.push('<text x="'+(b.x+svgPitchW-10)+'" y="'+(b.y+svgPitchH-10)+'" text-anchor="end" font-family="Inter,Helvetica,sans-serif" font-weight="400" font-size="9" fill="#666666" opacity="0.65">'+wmText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</text>');
    }
    svgLines.push('</svg>');
    var svgStr=svgLines.join('\n');

    var DPI_SCALE=Math.ceil(pitchDW_PT/svgPitchW*2);
    var ocW=Math.round(svgPitchW*DPI_SCALE);
    var ocH=Math.round(svgPitchH*DPI_SCALE);
    var oc=document.createElement('canvas');
    oc.width=ocW;oc.height=ocH;
    var oc2=oc.getContext('2d');
    var img=new Image();
    var svgBlob=new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'});
    var svgUrl=URL.createObjectURL(svgBlob);

    function buildPDF(){
      oc2.drawImage(img,0,0,ocW,ocH);
      URL.revokeObjectURL(svgUrl);
      var pitchImg=oc.toDataURL('image/png');

      var doc=new jsPDF_({orientation:'landscape',unit:'pt',format:fmt==='letter'?'letter':'a4'});
      // Place pitch image at aspect-ratio-correct size — circles stay circular
      doc.addImage(pitchImg,'PNG',OX2,OY2,pitchDW_PT,pitchDH_PT,undefined,'FAST');

      // Footer: drawn via jsPDF directly, strictly below the pitch image
      var curYear=new Date().getFullYear();
      var footerY=OY2+pitchDH_PT; // top of footer zone (just below image)
      var lineY=footerY+2;
      var textY=footerY+FOOTER_PT-5;
      var footerL=OX2;
      var footerR=OX2+pitchDW_PT;
      // Separator line
      doc.setDrawColor(180,180,180);
      doc.setLineWidth(0.4);
      doc.line(footerL,lineY,footerR,lineY);
      // Logo: "Nutmeg" in black, "&" in coral, "Needle" in black
      doc.setFont('helvetica','bold');doc.setFontSize(9);
      doc.setTextColor(26,26,26);
      doc.text('Nutmeg',footerL,textY);
      var nW=doc.getTextWidth('Nutmeg');
      doc.setTextColor(204,51,0);
      doc.text('&',footerL+nW,textY);
      var aW=doc.getTextWidth('&');
      doc.setTextColor(26,26,26);
      doc.text('Needle',footerL+nW+aW,textY);
      // URL + year right-aligned
      doc.setFont('helvetica','normal');doc.setFontSize(9);
      doc.setTextColor(102,102,102);
      doc.text('nutmegneedle.com \u00b7 '+curYear,footerR,textY,{align:'right'});

      doc.save('tactics-aida-pattern-'+new Date().toISOString().slice(0,10)+'.pdf');
    }

    img.onerror=function(){alert('Pattern export error: could not render design.');};
    img.onload=buildPDF;
    img.src=svgUrl;
  }

  function buildDiffSummary(data,st){
    const parts=[];
    if(data.colorA&&data.colorA!==st.colorA)parts.push('Team A colour');
    if(data.colorB&&data.colorB!==st.colorB)parts.push('Team B colour');
    if(data.teamNameA&&data.teamNameA!==st.teamNameA)parts.push('Team A name');
    if(data.teamNameB&&data.teamNameB!==st.teamNameB)parts.push('Team B name');
    if(data.players&&data.players.length){
      const moved=data.players.filter(function(dp){
        if(dp.ghost)return false;
        const p=st.players.find(function(p){return p.team===dp.team&&p.num===dp.num&&!p.ghost;});
        return p&&(Math.abs((dp.x||0)-p.x)>5||Math.abs((dp.y||0)-p.y)>5);
      }).length;
      const ghosts=data.players.filter(function(dp){return dp.ghost;}).length;
      if(moved)parts.push(moved+' player'+(moved>1?'s':'')+' repositioned');
      if(ghosts)parts.push(ghosts+' ghost'+(ghosts>1?'s':'')+' added');
    }
    if(data.balls&&data.balls.length)parts.push(data.balls.length+' ball'+(data.balls.length>1?'s':''));
    if(data.arrows&&data.arrows.length)parts.push(data.arrows.length+' arrow'+(data.arrows.length>1?'s':''));
    if(data.phases&&data.phases.length)parts.push(data.phases.length+' step'+(data.phases.length>1?'s':''));
    return parts.length?parts.join(', '):'no changes detected';
  }

  function applyBoardJSON(raw){
    const data=JSON.parse(raw),st=S.current;
    if(data.teamNameA!==undefined)st.teamNameA=data.teamNameA;
    if(data.teamNameB!==undefined)st.teamNameB=data.teamNameB;
    if(data.colorA!==undefined)st.colorA=data.colorA;
    if(data.colorB!==undefined)st.colorB=data.colorB;
    if(data.players&&Array.isArray(data.players)){
      // Remove any AI-generated ghost players first
      st.players=st.players.filter(p=>!p.ghost||!p.aiGenerated);
      data.players.forEach(dp=>{
        if(dp.ghost){
          // Add a new ghost player
          const base=st.players.find(p=>p.team===dp.team&&p.num===dp.num&&!p.ghost);
          if(base){
            st.players.push({
              id:'ghost_ai_'+dp.team+dp.num+'_'+Date.now(),
              team:dp.team,num:dp.num,
              x:dp.x!==undefined?dp.x:base.x,
              y:dp.y!==undefined?dp.y:base.y,
              ghost:true,aiGenerated:true,
              name:dp.name||base.name||''
            });
          }
        } else {
          const p=st.players.find(p=>p.team===dp.team&&p.num===dp.num&&!p.ghost);
          if(p){
            if(dp.x!==undefined)p.x=dp.x;
            if(dp.y!==undefined)p.y=dp.y;
            if(dp.name!==undefined)p.name=dp.name;
            if(dp.hidden!==undefined)p.hidden=dp.hidden;
          }
        }
      });
    }
    if(data.balls&&Array.isArray(data.balls)){
      st.balls=data.balls.map(function(b){return {x:b.x,y:b.y,ghost:b.ghost||false,score:b.score||false};});
    }
    if(data.arrows&&Array.isArray(data.arrows)){
      st.arrows=data.arrows.map(function(a){
        return {
          path:a.path||[],shape:a.shape||'free',style:a.style||'solid',
          color:a.color||(st.colorA||'#E24B4A'),
          headSize:a.headSize!==undefined?a.headSize:st.arrowHeadSize||'m',
          startAnchor:null,endAnchor:null,cp:a.cp||null
        };
      });
    }
    if(data.phases&&Array.isArray(data.phases))st.phases=data.phases;
    if(data.phaseColor)st.phaseColor=data.phaseColor;
    if(data.activePh!==undefined)st.activePh=data.activePh;
  }

  async function parseAI(){
    if(!canCall()){setAiStatus('⚠ Add an API key below to use this feature.');return;}
    if(!aiText.trim()&&!imageData){setAiStatus('⚠ Add some text or an image first.');return;}
    setAiLoading(true);setAiStatus('');
    const cA=S.current.colorA||'#E24B4A',cB=S.current.colorB||'#378ADD';
    const systemPrompt=`You are a football tactics analyst. Output ONLY valid JSON (no markdown, no explanation, no backticks).

PITCH: ${W}x${H}px. Origin (0,0) = top-left. Team A attacks left→right. Team B attacks right→left.
KEY COORDINATES:
  Centre spot: (${Math.round(W/2)},${Math.round(H/2)})
  Left goal mouth: (0,${Math.round(H/2)})    Right goal mouth: (${W},${Math.round(H/2)})
  Left penalty spot: (${Math.round(W*0.122)},${Math.round(H/2)})    Right penalty spot: (${Math.round(W*0.878)},${Math.round(H/2)})
  Left penalty area: x=0–${Math.round(W*0.185)}, y=${Math.round(H*0.217)}–${Math.round(H*0.783)}
  Right penalty area: x=${Math.round(W*0.815)}–${W}, y=${Math.round(H*0.217)}–${Math.round(H*0.783)}
  Left 6-yard box: x=0–${Math.round(W*0.063)}, y=${Math.round(H*0.35)}–${Math.round(H*0.65)}
  Right 6-yard box: x=${Math.round(W*0.937)}–${W}, y=${Math.round(H*0.35)}–${Math.round(H*0.65)}
  Centre circle radius: ~${Math.round(H*0.152)}px

TEAM COLOURS (already set): colorA=${cA}, colorB=${cB}. Use these for arrows unless a different colour is clearly correct.

JSON SCHEMA — all fields optional, include only what you can determine:
{
  teamNameA: string,
  teamNameB: string,
  colorA: "#rrggbb",   // Team A kit colour — only set if you can identify it
  colorB: "#rrggbb",   // Team B kit colour — only set if you can identify it
  players: [
    {
      team: "A"|"B",
      num: 1–11,
      x: number,  // pitch x coordinate
      y: number,  // pitch y coordinate
      name: string,   // optional player name
      ghost: true,    // ONLY set ghost:true for a "previous position" shadow — shows where player WAS before movement
      hidden: true    // ONLY set hidden:true if player is off-pitch / not relevant
    }
  ],
  balls: [
    {
      x: number, y: number,
      ghost: true,    // previous ball position
      score: true     // ball involved in a goal/scoring moment — adds burst effect
    }
  ],
  arrows: [
    {
      path: [{x,y},{x,y},...],  // 2+ points. For straight: just start+end. For curves: intermediate points.
      shape: "straight"|"free"|"curve"|"elbow",
      style: "solid"|"dashed"|"wave",
      color: "#rrggbb",  // Use colorA for Team A movements, colorB for Team B movements, white (#F5F5F5) for ball movement
      headSize: "m"|"none"  // use "none" for positioning/zone arrows with no direction, "m" for movement arrows
    }
  ],
  phases: [
    {
      label: number,   // step number
      note: string,    // brief description of this movement phase
      markers: [{x,y}] // optional step marker positions on pitch
    }
  ],
  phaseColor: "#rrggbb",
  activePh: number   // index of the active phase (0-based)
}

GUIDELINES:
- Ghost players: if a player clearly moved during the moment, place the player at their NEW position and add a ghost entry at their OLD position.
- Score moments: set score:true on the ball if this is a goal or clear scoring chance.
- Arrows should follow actual movement direction. Use dashed style for potential/anticipated runs, solid for completed moves, wave for uncertain/speculative.
- For a 4-4-2: defenders y≈${Math.round(H*0.5)}, midfielders y≈${Math.round(H*0.5)}, spread across x. Adjust for actual formation.
- Typical GK position: x≈${Math.round(W*0.05)} (Team A) or x≈${Math.round(W*0.95)} (Team B).
${aiTimestamp?`Match time: ${aiTimestamp}.`:''}`;
    const userContent=[];
    if(imageData)userContent.push({type:'image',source:{type:'base64',media_type:imageData.mimeType,data:imageData.base64}});
    userContent.push({type:'text',text:aiText.trim()||'Analyse this tactical image and place all players accurately on the pitch.'});
    try{
      // ── Pass 1: tactical analysis ──────────────────────────────────────────
      setAiStatus('🔍 Analysing…');
      const analysisPrompt=`You are a football tactics analyst. Analyse the input and describe in plain English:
1. The teams involved and their kit colours (hex if possible)
2. The formation and player positions for each team — be specific about player numbers and x/y positions on the pitch
3. The key tactical moment — what is happening, who is moving where
4. Any goals, scoring chances, or notable events
5. Suggested arrow directions and colours for player/ball movement
This analysis will be used to place objects on a tactics board.`;
      const resp1=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:getHeaders(),
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,system:analysisPrompt,
          messages:[{role:'user',content:userContent}]})});
      if(!resp1.ok){const e1=await resp1.json().catch(()=>({}));throw new Error(e1.error&&e1.error.message?e1.error.message:`HTTP ${resp1.status}`);}
      const d1=await resp1.json();
      let analysis=d1.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text||'';}).join('');
      // ── Pass 2: convert analysis to JSON — send only the analysis, not the original transcript ──
      setAiStatus('⚙ Building board…');
      const pass2Messages=[
        {role:'user',content:[{type:'text',text:'Convert this tactical analysis into the JSON object format specified in your system prompt. Output ONLY valid JSON, no explanation.\n\nANALYSIS:\n'+analysis}]}
      ];
      const resp2=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:getHeaders(),
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,system:systemPrompt,messages:pass2Messages})});
      if(!resp2.ok){const e2=await resp2.json().catch(()=>({}));throw new Error(e2.error&&e2.error.message?e2.error.message:`HTTP ${resp2.status}`);}
      const d2=await resp2.json();
      let text=d2.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text||'';}).join('');
      text=text.replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(text);
      const summary=buildDiffSummary(parsed,S.current);
      setAiPending({data:parsed,summary,analysis});
      setAiStatus('');
    }catch(err){setAiStatus('⚠ '+err.message);}
    setAiLoading(false);
  }

        {/* 3. Pitch settings */}
        <Collapsible label="Pitch settings" defaultOpen={false}>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:C.textMuted,marginBottom:4,fontWeight:500}}>VIEW</div>
            <Row style={{gap:4}}>
              <ToggleBtn active={st.view==='full'}  onClick={()=>setView('full')}>Full pitch</ToggleBtn>
              <ToggleBtn active={st.view==='left'}  onClick={()=>setView('left')}>Left half</ToggleBtn>
              <ToggleBtn active={st.view==='right'} onClick={()=>setView('right')}>Right half</ToggleBtn>
            </Row>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:C.textMuted,marginBottom:4,fontWeight:500}}>PLAYER SIZE</div>
            <Row style={{gap:4}}>
              <ToggleBtn active={st.pR===PSIZES.xs} onClick={()=>setPR(PSIZES.xs)}>XS</ToggleBtn>
              <ToggleBtn active={st.pR===PSIZES.s}  onClick={()=>setPR(PSIZES.s)}>S</ToggleBtn>
              <ToggleBtn active={st.pR===PSIZES.m}  onClick={()=>setPR(PSIZES.m)}>M</ToggleBtn>
              <ToggleBtn active={st.pR===PSIZES.l}  onClick={()=>setPR(PSIZES.l)}>L</ToggleBtn>

          </div>

              <ToggleBtn active={(st.labelContrast||'outline')==='outline'} onClick={()=>{S.current.labelContrast='outline';redraw();}}>Outlined</ToggleBtn>
              <ToggleBtn active={st.labelContrast==='dark'}               onClick={()=>{S.current.labelContrast='dark';redraw();}}>Dark</ToggleBtn>
            </Row>
          </div>
          <div style={{marginTop:8}}>
            <div style={{fontSize:10,color:C.textMuted,marginBottom:4,fontWeight:500}}>ALIGNMENT GRID</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <button onClick={()=>{S.current.showGrid=!S.current.showGrid;redraw();}}
                style={{fontSize:11,padding:'3px 10px',height:26,cursor:'pointer',borderRadius:6,
                  border:st.showGrid?`1.5px solid ${C.activeBorder}`:`0.5px solid ${C.inputBorder}`,

              <span style={{fontSize:10,color:C.textMuted}}>Not exported · 1 sq = ~3 stitches (280×250mm hoop, 14-ct aida)</span>
            </div>
          </div>
        </Collapsible>

        {/* 4. Legend settings */}
        <Collapsible label="Legend settings" defaultOpen={false}>
          {getLegendRows(S)&&(
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,color:C.text,marginBottom:6}}>Player legend</div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span style={{fontSize:10,color:C.textMuted,width:60}}>Text colour</span>
                  <input type="color" defaultValue={st.legend.textColor||'#222'} onChange={e=>{S.current.legend.textColor=e.target.value;redraw();}}
                    style={{width:32,height:24,padding:1,border:`0.5px solid ${C.inputBorder}`,borderRadius:4,cursor:'pointer'}}/>
                  <span style={{fontSize:10,color:C.textMuted,marginLeft:4}}>Font size</span>
                  <ToggleBtn active={(st.legend.scale||1)<0.8} onClick={()=>{S.current.legend.scale=0.65;S.current.legend.w=null;S.current.legend.h=null;redraw();}}>S</ToggleBtn>
                  <ToggleBtn active={(st.legend.scale||1)>=0.8&&(st.legend.scale||1)<1.3} onClick={()=>{S.current.legend.scale=1;S.current.legend.w=null;S.current.legend.h=null;redraw();}}>M</ToggleBtn>
                  <ToggleBtn active={(st.legend.scale||1)>=1.3} onClick={()=>{S.current.legend.scale=1.6;S.current.legend.w=null;S.current.legend.h=null;redraw();}}>L</ToggleBtn>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span style={{fontSize:10,color:C.textMuted,width:60}}>Layout</span>
                  <ToggleBtn active={(st.legend.cols||2)===2} onClick={()=>{S.current.legend.cols=2;S.current.legend.w=null;S.current.legend.h=null;redraw();}}>2 columns</ToggleBtn>
                  <ToggleBtn active={(st.legend.cols||2)===1} onClick={()=>{S.current.legend.cols=1;S.current.legend.w=null;S.current.legend.h=null;redraw();}}>1 column</ToggleBtn>
                </div>
                <Hint>Drag the legend by its body to reposition. Drag a corner or edge to resize and reflow text.</Hint>
              </div>
            </div>
          )}
          {st.phases.length>0&&(
            <div>
              <div style={{fontSize:11,fontWeight:600,color:C.text,marginBottom:6}}>Moves legend</div>
              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
                <span style={{fontSize:10,color:C.textMuted,width:60}}>Text colour</span>
                <input type="color" defaultValue={st.stepLegend.textColor||'#333'} onChange={e=>{S.current.stepLegend.textColor=e.target.value;redraw();}}
                  style={{width:32,height:24,padding:1,border:`0.5px solid ${C.inputBorder}`,borderRadius:4,cursor:'pointer'}}/>
                <span style={{fontSize:10,color:C.textMuted,marginLeft:4}}>Font size</span>
                <ToggleBtn active={(st.stepLegend.scale||1)<0.8} onClick={()=>{S.current.stepLegend.scale=0.65;S.current.stepLegend.w=null;S.current.stepLegend.h=null;redraw();}}>S</ToggleBtn>
                <ToggleBtn active={(st.stepLegend.scale||1)>=0.8&&(st.stepLegend.scale||1)<1.3} onClick={()=>{S.current.stepLegend.scale=1;S.current.stepLegend.w=null;S.current.stepLegend.h=null;redraw();}}>M</ToggleBtn>
                <ToggleBtn active={(st.stepLegend.scale||1)>=1.3} onClick={()=>{S.current.stepLegend.scale=1.6;S.current.stepLegend.w=null;S.current.stepLegend.h=null;redraw();}}>L</ToggleBtn>

            </div>

          {!getLegendRows(S)&&!st.phases.length&&(
            <Hint>Add player names in the Players section to show the player legend. Add moves to show the moves legend.</Hint>
          )}
        </Collapsible>

        {/* 4. AI match moment */}
        <Collapsible key={currentBoardId} label="Memorable moment" defaultOpen={false}>
          {(()=>{
            const mo=st.moment||{};
            const field=(key,label,multi,placeholder)=>(
              <div style={{marginBottom:8}}>
                <div style={{fontSize:10,color:C.textMuted,fontWeight:500,marginBottom:3}}>{label}</div>
                {multi
                  ? <textarea defaultValue={mo[key]||''} placeholder={placeholder}
                      onChange={e=>{if(!S.current.moment)S.current.moment={};S.current.moment[key]=e.target.value;}}
                      rows={3}
                      style={{width:'100%',fontSize:11,padding:'5px 8px',border:`0.5px solid ${C.inputBorder}`,borderRadius:6,background:'#fff',color:C.text,outline:'none',resize:'vertical',lineHeight:1.5,fontFamily:'inherit',boxSizing:'border-box'}}/>
                  : <input defaultValue={mo[key]||''} placeholder={placeholder}
                      onChange={e=>{if(!S.current.moment)S.current.moment={};S.current.moment[key]=e.target.value;}}
                      style={{width:'100%',fontSize:11,padding:'5px 8px',height:28,border:`0.5px solid ${C.inputBorder}`,borderRadius:6,background:'#fff',color:C.text,outline:'none',boxSizing:'border-box'}}/>
                }
              </div>
            );
            return <>
              {field('heading','Heading','','e.g. The Hand of God')}
              {field('what','What',true,'Short description of what occurred…')}
              {field('event','Event','','e.g. 1986 FIFA World Cup Quarter-Final')}
              {field('at','At','','e.g. Estadio Azteca, Mexico City')}
              {field('when','When','','e.g. 22 June 1986 · 51st minute')}
              {field('who','Who',true,'Key players involved…')}

            </>;
          })()}
        </Collapsible>

        {/* 6. Export */}
        <Collapsible label="Export" defaultOpen={false}>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:4}}>

                <button onClick={()=>setMode('crop')}
                  style={{fontSize:11,padding:'6px',cursor:'pointer',borderRadius:7,fontWeight:500,border:st.mode==='crop'?`1.5px solid ${C.blueBorder}`:`0.5px solid ${C.inputBorder}`,background:st.mode==='crop'?C.activeBg:C.inputBg,color:st.mode==='crop'?C.activeText:C.textMid}}>
                  ⬚ {st.cropRegion?'Redraw crop':'Set crop'}

                <button onClick={clearCrop} disabled={!st.cropRegion}
                  style={{fontSize:11,padding:'6px',cursor:st.cropRegion?'pointer':'default',borderRadius:7,fontWeight:500,border:`0.5px solid ${st.cropRegion?C.inputBorder:'#e5e5e5'}`,background:st.cropRegion?'#FFF0F0':'#F5F5F0',color:st.cropRegion?'#C0392B':'#ccc'}}>

                </button>
              </div>
              <div style={{padding:'6px 9px',borderRadius:7,fontSize:10,lineHeight:1.5,background:st.cropRegion?'#EEF6EE':'#F5F5F0',border:`0.5px solid ${st.cropRegion?'#8BC88B':'#ddd'}`,color:st.cropRegion?'#2a6b2a':C.textMuted}}>
                {st.cropRegion?<>✓ Crop set ({(st.exportFormat||'a4').toUpperCase()} {st.exportOrientation||'landscape'}) — drag edge handles on pitch to adjust</>:'No crop — exports use full pitch. Click "Set crop" then drag on the pitch.'}

            </div>
            <div style={{height:0.5,background:'rgba(0,0,0,0.07)',margin:'2px 0'}}/>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5}}>
                {[['a4','A4'],['letter','Letter'],['hoop','Nurge Hoop']].map(([val,lbl])=>(
                  <button key={val} onClick={()=>{S.current.exportFormat=val;if(S.current.cropRegion){S.current.cropRegion.h=S.current.cropRegion.w/pageAspect();}redraw();}}
                    style={{fontSize:11,padding:'5px',cursor:'pointer',borderRadius:7,fontWeight:500,border:st.exportFormat===val?`1px solid ${C.blueBorder}`:`0.5px solid ${C.inputBorder}`,background:st.exportFormat===val?C.activeBg:C.inputBg,color:st.exportFormat===val?C.activeText:C.textMid}}>{lbl}</button>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginTop:5}}>
                {[['landscape','Landscape'],['portrait','Portrait']].map(([val,lbl])=>(
                  <button key={val} onClick={()=>{S.current.exportOrientation=val;if(S.current.cropRegion){S.current.cropRegion.h=S.current.cropRegion.w/pageAspect();}redraw();}}
                    style={{fontSize:11,padding:'5px',cursor:'pointer',borderRadius:7,fontWeight:500,border:st.exportOrientation===val?`1px solid ${C.blueBorder}`:`0.5px solid ${C.inputBorder}`,background:st.exportOrientation===val?C.activeBg:C.inputBg,color:st.exportOrientation===val?C.activeText:C.textMid}}>{lbl}</button>
                ))}
              </div>
              {st.exportFormat==='hoop'&&<div style={{fontSize:10,color:C.textMuted,marginTop:4,padding:'6px 8px',background:C.cardBg,borderRadius:6,border:`0.5px solid ${C.cardBorder}`}}>📐 Nurge 280×250mm · landscape · 14-count aida · ~143×102 stitches · 1 sq ≈ 3 stitches</div>}
              <Hint style={{marginTop:5}}>{st.exportFormat==='hoop'?'Hoop format: embroidery SVG outputs at 280×250mm. PDF uses A4.':'Format applies to embroidery SVG and PDF. Colour SVG uses crop dimensions directly.'}</Hint>

            <div style={{height:0.5,background:'rgba(0,0,0,0.07)',margin:'2px 0'}}/>

              <button onClick={exportPatternPDF} style={{fontSize:12,padding:'7px 10px',cursor:'pointer',borderRadius:8,border:'none',background:C.blue,color:'#fff',fontWeight:500,textAlign:'left'}}>

              <Hint style={{marginTop:0}}>A4 landscape PDF at exact physical size. Print at 100% on aida cloth. Includes stitch-count grid.</Hint>
              <button onClick={exportPDF} style={{fontSize:12,padding:'7px 10px',cursor:'pointer',borderRadius:8,border:'none',background:C.blue,color:'#fff',fontWeight:500,textAlign:'left'}}>
                ↓ Print — instructions
              </button>
              <Hint style={{marginTop:0}}>Pitch diagram + DMC thread colours + steps + player roster.</Hint>
            </div>
          </div>
        </Collapsible>

        {/* 6. Board library (Firebase) */}

            <div>

              <button onClick={signInWithGoogle} style={{width:'100%',fontSize:12,padding:'8px',cursor:'pointer',borderRadius:8,border:'none',background:'#1A1A1A',color:'#fff',fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                <span style={{fontSize:16}}>G</span> Sign in with Google
              </button>
            </div>
          )}

          {fbUser&&(<>

            {/* Save current board */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:500,color:C.text,marginBottom:5}}>Save current board</div>
              <div style={{display:'flex',gap:5}}>
                <input value={newBoardName} onChange={function(e){setNewBoardName(e.target.value);}}

                  onKeyDown={function(e){if(e.key==='Enter')saveNewBoard();}}
                  style={{flex:1,fontSize:11,padding:'5px 8px',height:28,border:'0.5px solid '+C.inputBorder,borderRadius:6,background:'#fff',color:C.text,outline:'none'}}/>
                <button onClick={saveNewBoard} disabled={libSaving} style={{fontSize:11,padding:'5px 12px',height:28,cursor:libSaving?'default':'pointer',borderRadius:6,border:'none',background:C.blue,color:'#fff',fontWeight:600,flexShrink:0}}>
                  {libSaving?'…':'Save'}
                </button>
              </div>
              {libMsg&&<div style={{fontSize:11,color:libMsg.startsWith('Save failed')||libMsg.startsWith('Load failed')||libMsg.startsWith('Update failed')?C.red:C.green,marginTop:5}}>{libMsg}</div>}

                {/* Active board — full card */}
                {activeBoard&&(
                  <div style={{borderRadius:8,border:'1.5px solid '+C.activeBorder,overflow:'hidden',background:'#fff'}}>
                    {activeBoard.thumbnail&&<img src={activeBoard.thumbnail} alt="" style={{width:'100%',height:70,objectFit:'cover',display:'block'}}/>}
                    <div style={{padding:'6px 8px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:4}}>
                        <div style={{fontSize:11,fontWeight:600,color:C.activeText,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{activeBoard.name}</div>
                        <span style={{fontSize:9,padding:'1px 5px',borderRadius:4,background:C.activeBg,color:C.activeText,fontWeight:600,flexShrink:0}}>Active</span>
                      </div>
                      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                        <button onClick={function(){updateBoard(activeBoard.id);}} disabled={libSaving} style={{fontSize:10,padding:'3px 8px',cursor:libSaving?'default':'pointer',borderRadius:5,border:'none',background:C.blue,color:'#fff',fontWeight:600}}>{libSaving?'…':'Update'}</button>

                        <button onClick={function(){deleteBoard(activeBoard.id);}} style={{fontSize:10,padding:'3px 8px',cursor:'pointer',borderRadius:5,border:'0.5px solid '+C.inputBorder,background:'transparent',color:C.red}}>Delete</button>

                    </div>

                {otherBoards.length>0&&(
                  <div style={{display:'flex',flexDirection:'column',gap:2,marginTop:activeBoard?4:0}}>
                    {!activeBoard&&<Hint style={{marginBottom:4}}>Select a board to make it active.</Hint>}
                    {otherBoards.map(function(b){
                      const dateStr=b.updatedAt&&b.updatedAt.toDate?b.updatedAt.toDate().toLocaleDateString('sv-SE'):'';
                      return (
                        <button key={b.id} onClick={function(){loadBoard(b.id);}}
                          style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'6px 8px',cursor:'pointer',borderRadius:6,border:'0.5px solid '+C.cardBorder,background:'#FAFAF8',textAlign:'left'}}>
                          <span style={{flex:1,fontSize:11,color:C.text,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.name}</span>
                          <span style={{fontSize:10,color:C.textMuted,flexShrink:0,whiteSpace:'nowrap'}}>{dateStr}</span>
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>;
            })()}

            <div style={{height:0.5,background:'rgba(0,0,0,0.07)',margin:'10px 0 8px'}}/>
            <div style={{fontSize:11,fontWeight:500,color:C.text,marginBottom:4}}>Import from file</div>
            <Hint>Load a previously exported .json board file.</Hint>
            <button onClick={function(){importInputRef.current.click();}} style={{fontSize:12,padding:'6px 14px',height:30,cursor:'pointer',borderRadius:8,border:'1px solid '+C.inputBorder,background:'transparent',color:C.textMid,fontWeight:500,marginTop:6}}>Import board ↑</button>
          </>)}
        </Collapsible>

      </div>{/* end sidebar */}

        {/* Canvas */}
        <div style={{position:'relative',borderRadius:14,overflow:'hidden',boxShadow:'0 3px 16px rgba(0,0,0,0.13)'}}>
          <canvas ref={canvasRef} width={W} height={H}
            style={{display:'block',width:'100%',touchAction:'none',cursor:st.mode==='crop'?'crosshair':st.mode==='move'?cursorStyle:'crosshair'}}
            onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onLeave}/>
          <div style={{position:'absolute',bottom:10,left:10,display:'flex',gap:5,alignItems:'center'}}>
            <button onClick={()=>zoomStep(1.25,W/2,H/2)} style={{width:28,height:28,cursor:'pointer',borderRadius:7,border:'none',background:'rgba(0,0,0,0.45)',color:'#fff',fontSize:16,lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
            <button onClick={()=>zoomStep(0.8,W/2,H/2)}  style={{width:28,height:28,cursor:'pointer',borderRadius:7,border:'none',background:'rgba(0,0,0,0.45)',color:'#fff',fontSize:16,lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
            <button onClick={resetZoom} style={{height:28,padding:'0 8px',cursor:'pointer',borderRadius:7,border:'none',background:'rgba(0,0,0,0.45)',color:'#fff',fontSize:11}}>Reset</button>
          </div>
          <div style={{position:'absolute',bottom:13,right:10,fontSize:10,color:'rgba(255,255,255,0.5)',pointerEvents:'none'}}>Scroll to zoom · Space+drag to pan</div>
        </div>

        {/* Moves panel */}
        <Card style={{marginBottom:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:C.text}}>Moves</div>
              <div style={{fontSize:11,color:C.textMuted}}>Build the sequence of the moment</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
              <div style={{display:'flex',alignItems:'center',gap:3}}>
                <span style={{fontSize:10,color:C.textMuted}}>Colour</span>
                <input type="color" defaultValue={st.phaseColor} onChange={e=>{S.current.phaseColor=e.target.value;redraw();}}
                  style={{width:28,height:24,padding:2,border:`0.5px solid ${C.inputBorder}`,borderRadius:4,cursor:'pointer'}}/>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:3}}>
                <span style={{fontSize:10,color:C.textMuted}}>Size</span>
                {['xs','s','m','l'].map(sz=>(
                  <button key={sz} onClick={()=>{S.current.markerSize=sz;redraw();}}
                    style={{fontSize:10,width:22,height:22,cursor:'pointer',borderRadius:5,border:(st.markerSize||'m')===sz?`1.5px solid ${C.activeBorder}`:`0.5px solid ${C.inputBorder}`,background:(st.markerSize||'m')===sz?C.activeBg:'transparent',color:(st.markerSize||'m')===sz?C.activeText:C.textMuted,fontWeight:500,padding:0}}>
                    {sz.toUpperCase()}
                  </button>
                ))}
              </div>
              <ActionBtn onClick={()=>{addPhase();setMode('phase');}}>+ Add move</ActionBtn>
            </div>
          </div>

          {!st.phases.length&&(
            <div style={{padding:'8px 10px',background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:8}}>
              <div style={{fontSize:11,color:'#92400E',fontWeight:500,marginBottom:2}}>No moves yet</div>
              <div style={{fontSize:11,color:'#B45309'}}>Click <b>+ Add move</b> to create one, then click on the pitch to place markers.</div>
            </div>
          )}

          {st.phases.map((p,i)=>{
            const isAct=st.activePh===i&&st.mode==='phase';
            const isSelected=st.activePh===i;
            return <div key={i} style={{marginBottom:6,padding:'8px 10px',borderRadius:8,background:isAct?'#EFF6FF':isSelected?'#F7F7F4':'transparent',border:isAct?`1px solid ${C.blueBorder}`:isSelected?`1px solid ${C.cardBorder}`:'1px solid transparent'}}>
              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:isSelected?6:0}}>
                <div style={{width:30,height:30,borderRadius:6,background:isAct?C.blue:isSelected?st.phaseColor:'#E0E0DB',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <span style={{fontSize:14,fontWeight:700,color:'#fff',fontFamily:'sans-serif'}}>{phaseLabel(p.label)}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:600,color:isAct?C.activeText:isSelected?C.text:C.textMuted}}>
                    Move {phaseLabel(p.label)}
                    {isAct&&<span style={{fontWeight:400,color:C.activeText}}> — click pitch to place</span>}
                  </div>
                  <div style={{fontSize:10,color:C.textMuted}}>{(p.markers||[]).length} marker{(p.markers||[]).length!==1?'s':''} placed</div>
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  {!isAct&&<GhostBtn onClick={()=>{setActivePh(i);setMode('phase');}}>Place ①</GhostBtn>}
                  {isAct&&<GhostBtn active={true} onClick={()=>setMode('move')}>Done</GhostBtn>}
                  <GhostBtn onClick={()=>deletePhase(i)}>✕</GhostBtn>
                </div>
              </div>
              {isSelected&&(
                <div>
                  <input defaultValue={p.note||''} placeholder="Add a note for this step…"
                    onChange={e=>updatePhaseNote(i,e.target.value)}
                    style={{width:'100%',fontSize:11,padding:'4px 8px',border:`0.5px solid ${C.inputBorder}`,borderRadius:6,background:'#fff',color:C.text,outline:'none',boxSizing:'border-box'}}/>
                  {(p.markers||[]).length>0&&(
                    <div style={{display:'flex',gap:3,flexWrap:'wrap',marginTop:5}}>
                      {(p.markers||[]).map((_,mi)=>{
                        const isSel=st.selectedPhaseMarker&&st.selectedPhaseMarker.phaseIdx===i&&st.selectedPhaseMarker.markerIdx===mi;
                        return <button key={mi} onClick={()=>{S.current.selectedPhaseMarker={phaseIdx:i,markerIdx:mi};redraw();}}
                          style={{fontSize:11,width:24,height:24,cursor:'pointer',borderRadius:5,border:isSel?`1.5px solid ${C.activeBorder}`:`0.5px solid ${C.inputBorder}`,background:isSel?C.activeBg:st.phaseColor,color:isSel?C.activeText:'#fff',fontWeight:600}}>
                          {phaseLabel(p.label)}
                        </button>;
                      })}
                    </div>
                  )}
                </div>
              )}
            </div>;
          })}
        </Card>

      </div>{/* end right column */}

    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(TacticsBoard));


</script>

</body>
</html>
